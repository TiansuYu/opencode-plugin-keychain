name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # required for npm OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      # OIDC trusted publishing needs the npm CLI (>= 11.5.1) and Node >= 22.14.
      # bun publish does not support OIDC, so the publish step uses npm.
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.13 # pinned; bump manually

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag v$TAG does not match package.json version $PKG" >&2
            exit 1
          fi

      - name: Update npm to an OIDC-capable version
        run: npm install -g npm@latest

      - name: Publish to npm (OIDC trusted publishing)
        run: npm publish --access public
