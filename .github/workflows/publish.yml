name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # required for npm OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      # OIDC trusted publishing needs npm CLI >= 11.5.1, which ships with Node 24.
      # bun publish does not support OIDC, so the publish step uses npm.
      # NOTE: do NOT set registry-url — it writes an .npmrc with a token
      # placeholder that forces token auth and breaks OIDC (E404).
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"
          package-manager-cache: false

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.13 # pinned; bump manually

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag v$TAG does not match package.json version $PKG" >&2
            exit 1
          fi

      - name: Publish to npm (OIDC trusted publishing)
        run: npm publish --access public --provenance
